.kl-done-bar{position:relative;height:96px}
.kl-done-track{position:absolute;left:20px;right:20px;top:34px;height:8px;transform:translateY(-50%);background:rgba(255,255,255,.12);border-radius:999px;box-shadow:0 0 0 1px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,255,255,0.2);}
.kl-done-fill{height:8px;width:90%;background:repeating-linear-gradient(-45deg,#29a8ff,#29a8ff 3px,#70ddff 3px,#70ddff 6px);border-radius:999px;}
.kl-done-steps{position:relative;display:grid;grid-template-columns:repeat(5,1fr);height:100%;align-items:center}
.kl-done-step{text-align:center;position:relative;z-index:0;}
.kl-done-icon{width:46px;height:46px;margin:0 auto 7px;border-radius:14px;background:#09193a;border:2px solid rgba(255,255,255,.08);display:grid;place-items:center}
.kl-done-icon img{width:84%;height:84%;object-fit:contain}
.kl-done-step:not(.active):not(.done) .kl-done-icon{filter:grayscale(60%);}
.kl-done-step.active .kl-done-icon{
  position:relative;
  background:linear-gradient(180deg,
    #1a8cc2 0%, #1a8cc2 65%,
    #1580b0 65%, #1580b0 69.75%,
    #10749e 69.75%, #10749e 74.5%,
    #0b688c 74.5%, #0b688c 79.25%,
    #085c7a 79.25%, #085c7a 84%,
    #055068 84%, #055068 88.75%,
    #024456 88.75%, #024456 93.5%,
    #003848 93.5%, #003848 100%);
  border-color:#a0eeff;
  animation:kl-done-glow 2s ease-in-out infinite;
}
.kl-done-step.active .kl-done-icon::after{
  content:'✅';
  position:absolute;
  top:-8px;right:-10px;
  font-size:12px;
  animation:kl-done-float 2s ease-in-out infinite;
}
@keyframes kl-done-float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-5px);}
}
@keyframes kl-done-glow{
  0%,100%{box-shadow:0 0 6px 2px rgba(78,168,255,.3),0 0 12px 3px rgba(78,168,255,.15);}
  50%{box-shadow:0 0 16px 6px rgba(78,168,255,.7),0 0 32px 10px rgba(78,168,255,.35);}
}
.kl-done-step.active .kl-done-label{color:#5ddd81;position:relative;z-index:2;}
.kl-done-step.active .kl-done-amount{color:#5ddd81;position:relative;z-index:2;}
.kl-done-step.done .kl-done-label{color:#5ddd81;}
.kl-done-step.done .kl-done-amount{color:#5ddd81;}
.kl-done-amount{font-size:9px;font-weight:700;color:#dff3ff;margin-top:2px;
  text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000,-2px 0 0 rgba(0,0,0,0.4),2px 0 0 rgba(0,0,0,0.4);}
.kl-done-label{font-size:8px;color:rgba(255,255,255,.72);margin-top:7px;
  text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000,-2px 0 0 rgba(0,0,0,0.4),2px 0 0 rgba(0,0,0,0.4);}
@media(max-width:700px){
  .kl-done-wrap{padding:8px 10px}
  .kl-done-ticket-title{font-size:11px}
  .kl-done-bar{height:88px}
  .kl-done-track{left:14px;right:14px}
  .kl-done-icon{width:40px;height:40px}
}

/* Continue to egg button */
.kl-continue-wrap{
  display:none;text-align:center;margin-top:18px;
}
.kl-continue-btn{
  font-family:'Press Start 2P',cursive;font-size:12px;color:#fff;
  background:linear-gradient(180deg,
    #ff9f29 0%,#ff9f29 65%,#f09320 65%,#f09320 69.75%,
    #e18717 69.75%,#e18717 74.5%,#d27b0e 74.5%,#d27b0e 79.25%,
    #c36f05 79.25%,#c36f05 84%,#b46300 84%,#b46300 88.75%,
    #a55700 88.75%,#a55700 93.5%,#964b00 93.5%,#964b00 100%);
  border:3px solid #ffd080;border-radius:14px;
  padding:12px 28px;cursor:pointer;
  box-shadow:0 5px 0 #7a3500,0 6px 0 #000,0 6px 12px rgba(0,0,0,0.3),0 0 25px rgba(255,160,40,0.4),inset 0 1px 0 rgba(255,255,255,0.2);
  text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;
  letter-spacing:0;animation:continue-pulse 1.8s infinite;
  position:relative;top:0;transition:transform 0.1s;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
}
.kl-continue-btn:hover{transform:scale(1.04);}
.kl-continue-btn:active{top:3px;box-shadow:0 1px 0 #7a3500,0 2px 0 #000;}
@keyframes continue-pulse{
  0%{box-shadow:0 5px 0 #7a3500,0 6px 0 #000,0 0 0 0 rgba(255,160,40,0.6),inset 0 1px 0 rgba(255,255,255,0.2)}
  70%{box-shadow:0 5px 0 #7a3500,0 6px 0 #000,0 0 0 14px rgba(255,160,40,0),inset 0 1px 0 rgba(255,255,255,0.2)}
  100%{box-shadow:0 5px 0 #7a3500,0 6px 0 #000,0 0 0 0 rgba(255,160,40,0),inset 0 1px 0 rgba(255,255,255,0.2)}
}

        function _gachaWeightedRoll(table){
          var total=table.reduce(function(s,e){return s+e.weight;},0);
          var r=Math.random()*total;
          for(var i=0;i<table.length;i++){r-=table[i].weight;if(r<=0)return table[i];}
          return table[table.length-1];
        }

        function _gachaRollOne(){
          var animal=_gachaWeightedRoll(_GACHA_ANIMALS);
          var color=_gachaWeightedRoll(_GACHA_COLORS);
          var item=_gachaWeightedRoll(_GACHA_ITEMS);
          var pA=animal.weight/_GACHA_ANIMALS.reduce(function(s,e){return s+e.weight;},0);
          var pC=color.weight/_GACHA_COLORS.reduce(function(s,e){return s+e.weight;},0);
          var pI=item.weight/_GACHA_ITEMS.reduce(function(s,e){return s+e.weight;},0);
          var glitter=Math.random()<0.01;
          return {animal:animal,color:color,item:item,pct:pA*pC*pI*100,glitter:glitter};
        }

                }
                nextCrack();
            }

            function gLoseRoll(){
                var ov2=document.getElementById('_gachaOverlay');if(!ov2)return;
                var loseDiv=document.createElement('div');
                loseDiv.style.cssText='position:absolute;inset:0;z-index:9999998;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.92);border-radius:inherit;';
                loseDiv.innerHTML='<div style="font-family:\'Press Start 2P\',monospace;font-size:20px;color:#ff4444;text-shadow:0 0 20px #ff4444;margin-bottom:16px;">YOU LOST<br>THE ROLL!</div>'
                    +'<div style="font-family:\'Press Start 2P\',monospace;font-size:10px;color:#ccc;margin-bottom:28px;">Not enough taps</div>'
                    +'<button id="_gloseOk" style="background:rgba(255,255,255,0.08);border:2px solid #888;color:#fff;font-family:\'Press Start 2P\',monospace;font-size:10px;padding:12px 28px;border-radius:8px;cursor:pointer;">OK</button>';
                ov2.appendChild(loseDiv);
                document.getElementById('_gloseOk').addEventListener('click',function(){
                    loseDiv.remove();currentRoll++;
                    if(currentRoll<rolls){gResetForNextRoll();}else{gFinishAllRolls();}
                });
            }

            function gAdvance(e){
              if(!e)return;
              if(e.target&&(e.target.id==='_grclose'||e.target.id==='_gwclose'||e.target.id==='_gwpop'||e.target.id==='_gloseOk'||e.target.id==='_gPlayAgain'||e.target.id==='_gEndGame'))return;
              if(!gEggStarted)return;
              if(document.getElementById('_grov')&&document.getElementById('_grov').classList.contains('show'))return;
              gTapCount++;gTriggerEffects();
            }
            document.getElementById('_grclose').addEventListener('click',function(e){
              e.stopPropagation();
              var tgt=e.target;if(!tgt||tgt.tagName!=='BUTTON')return;
              var r=rollResults[currentRoll];
              allWon.push({
                animal:r.animal.name,animalKey:r.animal.key,
                color:r.color.name,colorKey:r.color.key,rarity:r.color.rarity,
                item:r.item.name,itemKey:r.item.key,tier:r.item.tier,
                glitter:r.glitter,pct:r.pct,
                imageUrl:_gachaGetImg(r.animal.key,r.color.key,r.item.key)||''
              });
              if(tgt.id==='_gEndGame'){gFinishAllRolls();}
              else{
                var remaining=rolls-(currentRoll+1);currentRoll++;
                if(remaining>0){gResetForNextRoll();}else{gFinishAllRolls();}
              }
            });

            document.getElementById('_gwclose').addEventListener('click',function(e){
                e.stopPropagation();
                var pop=document.getElementById('_gwpop');
                if(pop){pop.style.opacity='0';pop.style.transition='opacity 0.3s';setTimeout(function(){if(pop.parentNode)pop.remove();},300);}
                gStartEgg();
            });

            document.addEventListener('click',gAdvance);
        }

  // ── END GACHA CODE ────────────────────────────────────────────

  window.klShowCongrats = function() {
    var root = document.getElementById('kl-widget-root');
    var btn = root.querySelector('.done-btn');
    var congrats = document.getElementById('klCongrats');

    btn.style.display = 'none';
    congrats.style.display = 'block';

    // Confetti
    var canvas = document.getElementById('kl-confetti-canvas');
    var ctx = canvas.getContext('2d');
    canvas.width = congrats.offsetWidth || 400;
    canvas.height = 300;
    var colors = ['#ff4455','#ffd700','#41c0ff','#29ff7a','#ff8dab','#ffffff'];
    var particles = [];
    for(var i = 0; i < 120; i++){
      var angle = (Math.random() * Math.PI * 2);
      var speed = Math.random() * 4 + 1.5;
      particles.push({
        x: canvas.width / 2, y: 60,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 3,
        w: Math.random() * 6 + 8, h: Math.random() * 3 + 2,
        color: colors[Math.floor(Math.random() * colors.length)],
        rot: Math.random() * 360, rotV: (Math.random() - 0.5) * 4, alpha: 1
      });
    }
    var gravity = 0.08;
    function klDrawConfetti(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      var alive = false;
      particles.forEach(function(p){
        if(p.alpha <= 0) return;
        alive = true;
        p.vy += gravity; p.vx *= 0.99;
        p.x += p.vx; p.y += p.vy;
        p.rot += p.rotV; p.alpha -= 0.005;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
      });
      if(alive) requestAnimationFrame(klDrawConfetti);
    }
    klDrawConfetti();

    // After 2.5s, hide congrats and show ticket + continue button
    setTimeout(function() {
      congrats.style.display = 'none';
      var ticket = document.getElementById('klTicket');
      var continueWrap = document.getElementById('klContinueWrap');
      ticket.style.display = 'block';
      continueWrap.style.display = 'block';
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){ ticket.style.opacity = '1'; });
      });
    }, 2500);
  };

  window.klLaunchEgg = function() {
    var ticket = document.getElementById('klTicket');
    var continueWrap = document.getElementById('klContinueWrap');
    ticket.style.opacity = '0';
    setTimeout(function(){
      ticket.style.display = 'none';
      continueWrap.style.display = 'none';
      qsLaunchGacha();
    }, 400);
  };

  // Wait for postMessage from parent page to show the button
  window.addEventListener('message', function(e) {
    if(e.data === 'kl-quiz-passed') {
      document.querySelector('#kl-widget-root .done-container').style.display = 'block';
    }
  });

})();
</script>
